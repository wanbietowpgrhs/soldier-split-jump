            // 4. 穩穩落地
            `

                <g transform="translate(0, 8)">

                    <path d="M 83 48 Q 100 42 117 48" fill="none" stroke="#F43F5E" stroke-width="5" stroke-linecap="round" />

        // --- 音效合成器 (Web Audio API) ---
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // 播放可愛的電子切換音效 (Pop 音效)
        function playStepSound(index) {
            try {
                initAudio();
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }

                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();

                osc.connect(gain);
                gain.connect(audioCtx.destination);

                // 根據步驟決定基礎音高 (1: 準備 -> 5: 落地，音調逐漸上升，最後一個穩重低音)
                const tones = [261.63, 329.63, 392.00, 523.25, 349.23]; // C4, E4, G4, C5, F4
                const baseFreq = tones[index] || 300;

                osc.type = 'triangle'; // 三角波，聽起來比較柔和、像木琴/遊戲音效
                
                // 頻率快速滑動，做出「啵」的彈跳感
                osc.frequency.setValueAtTime(baseFreq, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(baseFreq * 1.5, audioCtx.currentTime + 0.12);

                // 音量淡出控制
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);

                osc.start();
                osc.stop(audioCtx.currentTime + 0.16);
            } catch (e) {
                console.log("Audio play blocked or not supported:", e);
            }
        }

        // 顯示特定步驟的函數
        function showStep(index) {
            // 1. 更新圖解
            const container = document.getElementById('graphic-container');
            container.innerHTML = svgs[index];

            // 2. 更新按鈕樣式 (高亮當前按鈕)
            for (let i = 0; i < 5; i++) {
                const btn = document.getElementById(`btn-${i}`);
                if (i === index) {
                    btn.classList.remove('bg-white', 'text-amber-800', 'border-amber-300');
                    btn.classList.add('bg-amber-500', 'text-white', 'border-amber-500');
                } else {
                    btn.classList.remove('bg-amber-500', 'text-white', 'border-amber-500');
                    btn.classList.add('bg-white', 'text-amber-800', 'border-amber-300');
                }
            }

            // 3. 更新 5 個獨立方塊的樣式 (高亮當前方塊)
            for (let i = 0; i < 5; i++) {
                const box = document.getElementById(`box-${i}`);
                const numSpan = box.querySelector('span');
                
                if (i === index) {
                    box.classList.remove('border-slate-100', 'bg-slate-50/50');
                    box.classList.add('border-orange-400', 'bg-orange-50/60', 'scale-[1.02]', 'shadow-md');
                    numSpan.classList.remove('bg-slate-200', 'text-slate-700');
                    numSpan.classList.add('bg-orange-500', 'text-white');
                } else {
                    box.classList.remove('border-orange-400', 'bg-orange-50/60', 'scale-[1.02]', 'shadow-md');
                    box.classList.add('border-slate-100', 'bg-slate-50/50');
                    numSpan.classList.remove('bg-orange-500', 'text-white');
                    numSpan.classList.add('bg-slate-200', 'text-slate-700');
                }
            }
        }

        // 當使用者主動點擊按鈕或方塊時
        function selectStep(index) {
            stopPlayAll(); // 手動點擊時，先停止自動播放
            showStep(index);
            playStepSound(index); // 播放對應步驟的音效
        }

        // --- 自動播放控制邏輯 ---
        let playInterval = null;
        let isPlaying = false;

        // 切換播放與停止狀態
        function togglePlayAll() {
            if (isPlaying) {
                stopPlayAll();
            } else {
                startPlayAll();
            }
        }

        // 開始播放
        function startPlayAll() {
            isPlaying = true;
            updatePlayButtonState(true);

            let current = 0;
            showStep(current);
            playStepSound(current);
            
            playInterval = setInterval(() => {
                current++;
                if (current < 5) {
                    showStep(current);
                    playStepSound(current);
                } else {
                    stopPlayAll(); // 播完最後一個動作後自動停止
                }
            }, 1000); // 播放速度：每個動作停留 1 秒 (1000 毫秒)
        }

        // 停止播放
        function stopPlayAll() {
            if (playInterval) {
                clearInterval(playInterval);
                playInterval = null;
            }
            isPlaying = false;
            updatePlayButtonState(false);
        }

        // 更新「播放/停止」按鈕的外觀與文字
        function updatePlayButtonState(playing) {
            const btn = document.getElementById('play-all-btn');
            const icon = document.getElementById('play-btn-icon');
            const text = document.getElementById('play-btn-text');

            if (playing) {
                // 變更為紅色「停止跳躍作戰！」
                btn.classList.remove('bg-orange-500', 'hover:bg-orange-600');
                btn.classList.add('bg-red-500', 'hover:bg-red-600');
                icon.innerText = '⏹️';
                text.innerText = '停止跳躍作戰！';
            } else {
                // 恢復為橘色「播放完整連續動作！」
                btn.classList.remove('bg-red-500', 'hover:bg-red-600');
                btn.classList.add('bg-orange-500', 'hover:bg-orange-600');
                icon.innerText = '▶️';
                text.innerText = '播放完整連續動作！';
            }
        }
